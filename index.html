<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaktüs // Norm Ender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay"></div>
    <div class="background-image"></div>

    <main class="player-container">
        <header class="song-info">
            <h1>KAKTÜS</h1>
            <p>Norm Ender</p>
        </header>

        <section class="lyrics-window">
            <div id="lyrics-content" class="lyrics-content">
                <p>Bir yanım kaktüs, bir yanım bahar...</p>
                <p>Yine de dikeni batar, ruhumu sarar.</p>
                <p>Bana boş laf anlatma kalbin taşa dönmüş,</p>
                <p>Bak o sözler sahteymiş aşkın yalanmış...</p>
            </div>
        </section>

        <footer class="controls">
            <audio id="music" src="kaktus.mp3"></audio>
            <button onclick="togglePlay()" id="playBtn">DİNLE</button>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
