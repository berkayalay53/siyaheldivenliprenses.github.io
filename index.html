<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaktüs // Norm Ender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay"></div>
    <div class="background-image"></div>

    <main class="player-container">
        <header class="song-info">
            <h1>Kaktüs</h1>
            <p>Norm Ender</p>
        </header>

        <section class="lyrics-window">
            <div id="lyrics-content" class="lyrics-content">
                <p id="line1">Bana boş laf anlatma...</p>
                <p id="line2">Kalbin taşa dönmüş senin.</p>
                <p id="line3">Bir gülün yok kaktüssün,</p>
                <p id="line4">Ruhum boyun eğmez sana.</p>
            </div>
        </section>

        <footer class="controls">
            <audio id="music" src="kaktus.mp3"></audio>
            <button onclick="togglePlay()" id="playBtn">BAŞLAT</button>
        </footer>
    </main>

    <script src="script.js">
    <script>
    const music = document.getElementById('music');
const playBtn = document.getElementById('playBtn');
const lyricsContent = document.getElementById('lyrics-content');

function togglePlay() {
    if (music.paused) {
        music.play();
        playBtn.innerText = "DURAKLAT";
        playBtn.style.opacity = "0.5";
    } else {
        music.pause();
        playBtn.innerText = "DEVAM ET";
        playBtn.style.opacity = "1";
    }
}

// Sözlerin şarkıyla senkronize kayması için küçük bir hesap
music.ontimeupdate = function() {
    let currentTime = music.currentTime;
    
    // Her 5 saniyede bir sözleri yukarı kaydır (Örnek bir zamanlama)
    if (currentTime > 5 && currentTime < 10) {
        lyricsContent.style.transform = "translateY(-40px)";
    } else if (currentTime > 10) {
        lyricsContent.style.transform = "translateY(-80px)";
    } else {
        lyricsContent.style.transform = "translateY(0)";
    }
};
        </script>
</body>
</html>
